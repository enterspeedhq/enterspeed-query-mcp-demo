<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterspeed Query Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-icon">ES</div>
      <div class="header-text">
        <h1>Enterspeed Query Chat</h1>
        <p class="subtitle">Ask questions about your Enterspeed data — powered by Claude</p>
      </div>
      <button id="clearBtn" title="Clear conversation">New chat</button>
    </header>

    <div class="chat-window" id="chatWindow">
      <div class="empty-state" id="emptyState"></div>
    </div>

    <div class="tool-trace" id="toolTrace" hidden>
      <details>
        <summary id="toolTraceSummary">Tool calls</summary>
        <div id="toolTraceContent"></div>
      </details>
    </div>

    <form class="input-area" id="chatForm">
      <textarea
        id="messageInput"
        placeholder="Ask something about your Enterspeed data…"
        rows="3"
        autofocus
      ></textarea>
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
